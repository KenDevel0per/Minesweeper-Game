<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Minesweeper Game v1.0</title>
	<link rel="stylesheet" href="style.css">
	<link rel="icon" href="favicon.ico">
</head>
<body>
<div class="game-container">
        <h1>Minesweeper Game &#x1F4A3;</h1>
        <div class="info-panel">
            <div class="info-item">
                <div>Mines:</div>
                <div class="info-value" id="mines-count">20</div>
            </div>
            <div class="info-item">
                <div>Flags:</div>
                <div class="info-value" id="flags-count">0</div>
            </div>
            <div class="info-item">
                <div>Time:</div>
                <div class="info-value" id="timer">0</div>
            </div>
        </div>
        <div id="game-board"></div>            <div class="button-container">
            <button id="flag-mode-btn" onclick="toggleFlagMode()">&#x1F6A9; Flags</button>
            <button onclick="initGame()">&#x1F504; New game</button>
        </div>
        <div id="message" class="message"></div>
    </div>
    	<script src="script.js"></script>
</body>
</html>
